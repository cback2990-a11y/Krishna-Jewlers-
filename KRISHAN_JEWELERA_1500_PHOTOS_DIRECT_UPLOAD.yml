name: Build KRISHAN JEWELERA 1500 Photos Smooth APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Create Android project
        run: |
          rm -rf app build.gradle settings.gradle gradle.properties
          mkdir -p app/src/main/java/com/krishanjewelera/app app/src/main/assets app/src/main/res/drawable app/src/main/res/mipmap-hdpi app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = 'KrishanJeweleraPremium'
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.7.3' apply false
          }
          EOF

          cat > gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          android.useAndroidX=false
          android.nonTransitiveRClass=true
          EOF

          cat > app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }

          android {
              namespace 'com.krishanjewelera.app'
              compileSdk 35
              defaultConfig {
                  applicationId 'com.krishanjewelera.app'
                  minSdk 23
                  targetSdk 35
                  versionCode 4
                  versionName '4.0-1500-photos'
              }
          }
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources><string name="app_name">Krishan Jewelera</string></resources>
          EOF

          cat > app/src/main/res/values/colors.xml <<'EOF'
          <resources><color name="black">#000000</color></resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:theme="@style/AppTheme" android:label="Krishan Jewelera" android:usesCleartextTraffic="true" android:hardwareAccelerated="true" android:allowBackup="true" android:supportsRtl="true">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
            <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
              <item name="android:windowNoTitle">true</item>
              <item name="android:windowActionBar">false</item>
              <item name="android:fontFamily">sans</item>
              <item name="android:colorAccent">#d9a33a</item>
              <item name="android:navigationBarColor">#000000</item>
              <item name="android:windowLightStatusBar">false</item>
              <item name="android:statusBarColor">#000000</item>
            </style>
          </resources>
          EOF

          cat > app/src/main/res/drawable/ic_launcher_background.xml <<'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle"><solid android:color="#050505"/></shape>
          EOF

          cat > app/src/main/java/com/krishanjewelera/app/MainActivity.java <<'EOF'
          package com.krishanjewelera.app;

          import android.app.Activity;
          import android.os.Bundle;
          import android.view.View;
          import android.view.Window;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;

          public class MainActivity extends Activity {
              private WebView webView;
              @Override public void onCreate(Bundle b) {
                  super.onCreate(b);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().getDecorView().setSystemUiVisibility(View.SYSTEM_UI_FLAG_LAYOUT_STABLE);
                  webView = new WebView(this);
                  setContentView(webView);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setDatabaseEnabled(true);
                  s.setLoadWithOverviewMode(true);
                  s.setUseWideViewPort(true);
                  s.setAllowFileAccess(true);
                  s.setAllowContentAccess(true);
                  s.setCacheMode(WebSettings.LOAD_DEFAULT);
                  s.setMediaPlaybackRequiresUserGesture(false);
                  webView.setLayerType(View.LAYER_TYPE_HARDWARE, null);
                  webView.setWebChromeClient(new WebChromeClient());
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/index.html");
              }
              @Override public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) webView.goBack(); else super.onBackPressed();
              }
          }
          EOF

          cat > app/src/main/assets/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
          <meta charset="utf-8"/>
          <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
          <title>Krishan Jewelera</title>
          <style>
          :root{--gold:#d9a33a;--gold2:#ffe49a;--gold3:#a66d0e;--bg:#050505;--card:#0d0d0d;--text:#fff4d9;--muted:#bcae94;--line:#6b4c16;--shadow:0 14px 38px rgba(0,0,0,.45);--glass:rgba(255,255,255,.045);--safeB:env(safe-area-inset-bottom)}
          body.light{--bg:#fffdfa;--card:#fff9ed;--text:#3a240d;--muted:#755a35;--line:#e8d3a3;--glass:rgba(255,248,229,.8);--shadow:0 12px 28px rgba(166,109,14,.18)}
          *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;overflow:hidden} body{transition:background .35s,color .35s}
          .app{height:100%;max-width:560px;margin:0 auto;position:relative;background:radial-gradient(circle at 50% 0,rgba(217,163,58,.15),transparent 38%),var(--bg);overflow:hidden}.screen{height:100%;overflow-y:auto;padding:18px 18px 92px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}.hidden{display:none!important}
          .top{display:flex;align-items:center;justify-content:space-between;padding-top:2px}.icon{width:42px;height:42px;display:grid;place-items:center;border-radius:16px;color:var(--gold);font-size:24px}.brand{text-align:center;line-height:1}.monogram{font-family:Georgia,serif;font-size:38px;color:var(--gold);font-weight:700;margin-top:-2px}.brandname{font-family:Georgia,serif;letter-spacing:5px;font-size:28px;color:var(--gold2);text-shadow:0 0 25px rgba(217,163,58,.3)}body.light .brandname{color:#c99021}.sub{letter-spacing:8px;font-size:11px;color:var(--gold2);opacity:.9}body.light .sub{color:#b38326}
          .search{height:54px;border:1px solid var(--line);border-radius:14px;margin:20px 0 16px;display:flex;align-items:center;gap:12px;padding:0 14px;background:var(--glass);box-shadow:var(--shadow)}.search input{flex:1;background:transparent;border:0;outline:0;color:var(--text);font-size:16px}.search input::placeholder{color:var(--muted)}
          .hero{height:270px;border:1px solid var(--line);border-radius:14px;overflow:hidden;position:relative;box-shadow:var(--shadow);touch-action:pan-y;background:#111}.slides{height:100%;display:flex;transition:transform .45s cubic-bezier(.2,.8,.2,1);will-change:transform}.slide{min-width:100%;position:relative;display:flex;align-items:center;padding:26px;overflow:hidden}.slide .copy{width:48%;z-index:2}.over{font-family:Georgia,serif;font-size:16px;color:var(--gold2);margin-bottom:8px}.headline{font-family:Georgia,serif;font-size:33px;line-height:1.05;color:var(--gold2);margin:0 0 14px}.desc{font-size:14px;color:#d8cbb2;line-height:1.35}.cta{display:inline-flex;align-items:center;gap:9px;border:1px solid var(--gold);border-radius:9px;padding:11px 16px;color:var(--gold2);margin-top:13px;font-weight:700;font-size:13px}.jewel-big{position:absolute;right:-10px;top:20px;width:65%;height:85%;filter:drop-shadow(0 12px 20px rgba(217,163,58,.25))}.dots{position:absolute;bottom:14px;left:0;right:0;display:flex;justify-content:center;gap:10px}.dot{width:9px;height:9px;border-radius:50%;background:#7b746a}.dot.active{background:var(--gold)}
          body.light .hero{background:#fff7e8}.light .slide .headline,.light .over{color:#3a240d}.light .slide .desc{color:#614a2c}.light .hero .cta{background:linear-gradient(135deg,var(--gold),#c18316);color:#fff;border:0}.light .slide:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,#fff5de 0%,rgba(255,245,222,.8) 44%,rgba(255,244,218,.2))}.darkSlide:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.85) 0%,rgba(0,0,0,.55) 45%,rgba(0,0,0,.15))}.fabric{position:absolute;inset:0;background:radial-gradient(circle at 85% 20%,rgba(217,163,58,.2),transparent 24%),linear-gradient(125deg,#050505,#101010 50%,#030303)}.light .fabric{background:radial-gradient(circle at 85% 20%,rgba(217,163,58,.18),transparent 24%),linear-gradient(125deg,#fff8e8,#ffefcb 52%,#fffaf2)}
          h2{font-family:Georgia,serif;font-size:26px;margin:22px 0 12px;color:var(--gold2)}body.light h2{color:#3a240d}.rowTitle{display:flex;justify-content:space-between;align-items:center}.view{color:var(--gold2);font-family:Georgia,serif;font-size:16px}.catrow{display:flex;gap:16px;overflow-x:auto;padding:8px 0 12px;scroll-snap-type:x proximity}.cat{min-width:82px;text-align:center;scroll-snap-align:start}.catpic{width:82px;height:82px;border:1px solid var(--line);border-radius:50%;display:grid;place-items:center;background:linear-gradient(145deg,rgba(217,163,58,.08),rgba(255,255,255,.02));overflow:hidden}.cat span{font-size:14px;margin-top:7px;display:block;color:var(--text)}
          .collectionRow{display:flex;gap:14px;overflow-x:auto;padding:8px 0 16px;scroll-snap-type:x mandatory}.collection{min-width:165px;height:185px;border:1px solid var(--line);border-radius:9px;overflow:hidden;position:relative;scroll-snap-align:start;background:#111}.collection svg{width:100%;height:126px}.collection .name{font-family:Georgia,serif;color:var(--gold2);font-size:18px;padding:9px 11px;background:linear-gradient(180deg,transparent,rgba(0,0,0,.65));position:absolute;left:0;right:0;bottom:0}.banner{display:flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:14px;padding:13px;margin-top:4px;background:var(--glass)}.banner .gift{width:58px;height:58px;border-radius:50%;display:grid;place-items:center;border:1px solid var(--line);font-size:28px;color:var(--gold)}.banner b{font-family:Georgia,serif;font-size:19px}.banner small{display:block;color:var(--muted);margin-top:4px}
          .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.product{border:1px solid var(--line);border-radius:11px;overflow:hidden;background:var(--card);position:relative;box-shadow:var(--shadow)}.product svg{width:100%;height:150px;display:block}.grid.three .product svg{height:124px}.pname{font-family:Georgia,serif;font-size:17px;padding:10px 11px 3px;color:var(--gold2);min-height:52px}.light .pname{color:#3a240d}.ptype{padding:0 11px 12px;color:var(--muted);font-size:12px}.heart{position:absolute;right:10px;top:9px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.32);display:grid;place-items:center;color:#ffe49a;font-size:20px}.light .heart{background:rgba(255,255,255,.8);color:#7b5a1a}.filters{display:flex;gap:11px;align-items:center;margin-bottom:14px}.chip{border:1px solid var(--line);border-radius:999px;padding:10px 17px;color:var(--text);background:transparent;white-space:nowrap}.chip.active{background:linear-gradient(135deg,var(--gold),#b67812);color:#fff;border:0}.pillbar{display:flex;gap:10px;overflow-x:auto;padding-bottom:10px}.sortFilter{margin-left:auto;display:flex;gap:10px}.btn{border:1px solid var(--line);border-radius:11px;background:transparent;color:var(--gold2);padding:12px 18px;font-weight:700}.goldBtn{background:linear-gradient(135deg,var(--gold2),var(--gold3));border:0;color:#160f05;border-radius:12px;padding:14px 18px;font-weight:800}.whiteBtn{background:transparent;border:1px solid var(--line);color:var(--text);border-radius:12px;padding:14px 18px;font-weight:700}.detailImg{height:360px;border:1px solid var(--line);border-radius:14px;overflow:hidden;position:relative;touch-action:pan-y}.detailImg .slides{height:100%}.detailInfo{border:1px solid var(--line);border-radius:13px;margin-top:16px;padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:13px;background:var(--glass)}.infoItem b{display:block;color:var(--gold2);font-family:Georgia,serif;font-size:17px}.infoItem span{font-size:14px;color:var(--muted)}.fixedActions{position:sticky;bottom:84px;display:flex;gap:12px;margin-top:18px}.fixedActions>*{flex:1}.settingsCard{border:1px solid var(--line);border-radius:14px;background:var(--glass);padding:16px;margin:14px 0}.themeOpt{display:flex;gap:12px}.themeOpt button{flex:1}.list{border:1px solid var(--line);border-radius:12px;overflow:hidden}.listItem{display:flex;align-items:center;gap:14px;padding:14px;border-bottom:1px solid rgba(217,163,58,.25)}.listItem:last-child{border-bottom:0}.listIcon{width:48px;height:48px;border-radius:50%;border:1px solid var(--line);display:grid;place-items:center;color:var(--gold);font-size:24px}.pageTitle{font-family:Georgia,serif;font-size:36px;margin:20px 0 6px;color:var(--gold2)}.subText{color:var(--muted);margin-bottom:16px}.bottom{position:absolute;bottom:0;left:0;right:0;height:78px;padding-bottom:var(--safeB);display:grid;grid-template-columns:repeat(5,1fr);background:rgba(0,0,0,.92);border-top:1px solid rgba(217,163,58,.45);backdrop-filter:blur(18px)}.light .bottom{background:rgba(255,255,255,.94)}.nav{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#b7aa97;font-size:12px}.nav .ni{font-size:26px}.nav.active{color:var(--gold2)}.toast{position:absolute;left:24px;right:24px;bottom:96px;background:#111;border:1px solid var(--line);color:#ffe49a;border-radius:12px;padding:13px;text-align:center;transform:translateY(120px);transition:.3s}.toast.show{transform:translateY(0)}
          @media(max-width:420px){.headline{font-size:28px}.hero{height:248px}.slide{padding:20px}.brandname{font-size:23px}.grid.three{grid-template-columns:repeat(2,1fr)}.product svg{height:138px}.pageTitle{font-size:31px}}
          </style>
          </head><body><div class="app" id="app"><main class="screen" id="screen"></main><nav class="bottom" id="bottom"></nav><div class="toast" id="toast"></div></div>
          <script>
          const TOTAL_PHOTOS=1500; const ITEMS_PER_CAT=150; let visibleCount=120; // 1500 offline generated gold jewellery photo/design cards
          let theme=localStorage.kj_theme||'dark', page='home', activeHero=0, activeDetail=0, currentCat='All', q='';
          const cats=['Necklaces','Earrings','Bangles','Rings','Pendants','Chains','Bracelets','Mangalsutra','Anklets','Kids Gold'];
          const collections=['Royal Heritage','Classic Elegance','Eternal Grace','Divine Beauty','Festive Gold','Temple Collection','Wedding Gold','Daily Wear'];
          const productNames={Necklaces:['Regal Radiance Necklace','Temple Grace Necklace','Heritage Droplet Necklace','Floral Majesty Necklace'],Earrings:['Classic Jhumka Earrings','Golden Grace Earrings','Majestic Drops','Floral Stud Earrings'],Bangles:['Regal Bangles','Eternal Grace Bangle','Classic Gold Bangles','Antique Gold Bangle'],Rings:['Timeless Charm Ring','Golden Bloom Ring','Classic Gold Ring','Floral Gold Ring'],Pendants:['Divine Pendant','Minimal Pendant','Traditional Pendant','Round Gold Pendant'],Chains:['Elegant Gold Chain','Classic Link Chain','Daily Gold Chain','Royal Chain'],Bracelets:['Heritage Bracelet','Floral Gold Bracelet','Elegant Bracelet','Classic Bracelet'],Mangalsutra:['Traditional Mangalsutra','Temple Mangalsutra','Gold Bead Mangalsutra','Classic Mangalsutra'],Anklets:['Royal Gold Anklets','Temple Anklets','Classic Gold Anklets','Festive Anklets'],'Kids Gold':['Kids Bracelet','Kids Chain','Baby Gold Bangle','Kids Pendant']};
          document.body.classList.toggle('light',theme==='light');
          function icon(name){return {home:'⌂',cat:'▦',col:'✤',wish:'♡',acc:'♙',bell:'♧',bag:'▢',cam:'▣',search:'⌕',menu:'☰',back:'‹'}[name]||name}
          function jewelrySVG(type='Necklaces',idx=0,bg='dark'){let seed=(idx*47+type.length*13)%360; let cloth=bg==='light'?'#fff1d6':['#070707','#102015','#2b0811','#21170d'][idx%4]; let gold1='#ffd36a',gold2='#b87912',gold3='#fff0aa';
            const base=`<defs><radialGradient id="g${idx}" cx="35%" cy="25%"><stop offset="0" stop-color="${gold3}"/><stop offset=".45" stop-color="${gold1}"/><stop offset="1" stop-color="${gold2}"/></radialGradient><filter id="s${idx}"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity=".45"/></filter></defs><rect width="100%" height="100%" fill="${cloth}"/><path d="M0 0 C80 60 130 20 250 80 S360 45 520 120" stroke="rgba(255,255,255,.06)" stroke-width="44" fill="none"/>`;
            const bead=(x,y,r=5)=>`<circle cx="${x}" cy="${y}" r="${r}" fill="url(#g${idx})" stroke="#7a4b0b" stroke-width="1"/>`;
            let s='';
            if(type.includes('Necklace')||type==='Mangalsutra'||type==='Chains'){
              s+=`<path d="M45 70 C85 150 185 150 225 70" fill="none" stroke="url(#g${idx})" stroke-width="10" filter="url(#s${idx})"/><path d="M60 72 C92 122 178 122 210 72" fill="none" stroke="url(#g${idx})" stroke-width="5"/>`;
              for(let i=0;i<17;i++){let x=58+i*10, y=82+Math.sin(i/16*Math.PI)*56; s+=bead(x,y,4+(i%3)); if(i%3===0)s+=bead(x,y+13,3)} s+=`<circle cx="135" cy="143" r="24" fill="url(#g${idx})" stroke="#7a4b0b"/><circle cx="135" cy="143" r="12" fill="none" stroke="#6e4309" stroke-width="3"/><path d="M120 175 C130 195 140 195 150 175" fill="url(#g${idx})"/>`;
              if(type==='Mangalsutra') for(let i=0;i<12;i++) s+=`<circle cx="${60+i*13}" cy="${63+i%2*3}" r="3" fill="#0a0a0a" stroke="${gold2}"/>`;
            } else if(type.includes('Earring')) { for(let e=0;e<2;e++){let cx=95+80*e; s+=`<circle cx="${cx}" cy="62" r="12" fill="url(#g${idx})"/><path d="M${cx-22} 103 C${cx-18} 66 ${cx+18} 66 ${cx+22} 103 Q${cx} 128 ${cx-22} 103" fill="url(#g${idx})" stroke="#7a4b0b" stroke-width="2"/>`; for(let i=0;i<7;i++)s+=bead(cx-21+i*7,105+Math.sin(i)*4,4)} }
            } else if(type.includes('Bangle')||type==='Bracelets'||type==='Anklets') { for(let j=0;j<2;j++){s+=`<ellipse cx="${115+j*35}" cy="108" rx="54" ry="22" fill="none" stroke="url(#g${idx})" stroke-width="13" filter="url(#s${idx})"/><ellipse cx="${115+j*35}" cy="108" rx="37" ry="13" fill="none" stroke="#7b4a09" stroke-width="3"/>`; for(let i=0;i<12;i++)s+=bead(70+j*35+i*8,98+Math.sin(i)*8,3)} }
            else if(type.includes('Ring')){s+=`<ellipse cx="135" cy="130" rx="54" ry="27" fill="none" stroke="url(#g${idx})" stroke-width="15"/><circle cx="135" cy="74" r="30" fill="url(#g${idx})" stroke="#7a4b0b"/><circle cx="135" cy="74" r="13" fill="#9a0d22" opacity=".7"/>`; for(let i=0;i<12;i++){let a=i*Math.PI/6;s+=bead(135+Math.cos(a)*38,74+Math.sin(a)*38,4)}}
            else {s+=`<path d="M135 48 L180 110 L135 180 L90 110 Z" fill="url(#g${idx})" stroke="#7a4b0b" stroke-width="3"/><circle cx="135" cy="110" r="25" fill="none" stroke="#6d4209" stroke-width="5"/>`; for(let i=0;i<14;i++){let a=i*Math.PI/7;s+=bead(135+Math.cos(a)*54,110+Math.sin(a)*70,4)}}
            return `<svg viewBox="0 0 270 210" xmlns="http://www.w3.org/2000/svg">${base}${s}</svg>`;
          }
          function items(limit=40){let arr=[];let chosen=currentCat==='All'?cats:cats.filter(c=>c===currentCat); for(let c of chosen){for(let i=0;i<ITEMS_PER_CAT;i++){let name=(productNames[c]||[c+' Item'])[i%4];arr.push({cat:c,name:name,id:c+'-'+i,type:c,idx:i+cats.indexOf(c)*31})}} if(q) arr=arr.filter(x=>(x.name+' '+x.cat).toLowerCase().includes(q.toLowerCase())); return arr.slice(0,limit)}
          function top(){return `<div class="top"><div class="icon" onclick="toast('Menu ready')">${icon('menu')}</div><div class="brand"><div class="monogram">KJ</div><div class="brandname">KRISHAN</div><div class="sub">JEWELERA</div></div><div style="display:flex"><div class="icon" onclick="toast('Notifications')">${icon('bell')}</div><div class="icon" onclick="go('wishlist')">♡</div></div></div>`}
          function searchBox(){return `<div class="search"><span style="font-size:26px;color:var(--gold)">${icon('search')}</span><input id="searchInput" placeholder="Search for necklaces, earrings, rings and more..." value="${q}" oninput="q=this.value; if(page==='home'){} else render()" onkeydown="if(event.key==='Enter'){q=this.value;go('products')}"><span onclick="go('products')" style="font-size:24px;color:var(--gold)">${icon('cam')}</span></div>`}
          const heroSlides=[['Timeless Beauty','Crafted in Gold, Worn with Pride.','Discover the artistry of tradition and elegance.','Necklaces'],['Royal Heritage','Gold that speaks tradition.','Explore handcrafted gold jewellery.','Earrings'],['Treasure Forever','Made for every special moment.','Separate category, smooth gallery, no price.','Bangles']];
          function hero(){return `<div class="hero" id="hero"><div class="slides" style="transform:translateX(${-activeHero*100}%)">${heroSlides.map((h,i)=>`<div class="slide darkSlide"><div class="fabric"></div><div class="copy"><div class="over">${h[0]}</div><h1 class="headline">${h[1]}</h1><p class="desc">${h[2]}</p><div class="cta" onclick="currentCat='${h[3]}';go('products')">EXPLORE COLLECTIONS ›</div></div><div class="jewel-big">${jewelrySVG(h[3],i,theme==='light'?'light':'dark')}</div></div>`).join('')}</div><div class="dots">${heroSlides.map((_,i)=>`<span class="dot ${i===activeHero?'active':''}"></span>`).join('')}</div></div>`}
          function home(){return `${top()}${searchBox()}${hero()}<div class="rowTitle"><h2>Shop by Category</h2><span class="view" onclick="go('categories')">View All ›</span></div><div class="catrow">${cats.slice(0,10).map((c,i)=>`<div class="cat" onclick="currentCat='${c}';go('products')"><div class="catpic">${jewelrySVG(c,i,theme==='light'?'light':'dark')}</div><span>${c}</span></div>`).join('')}</div><div class="rowTitle"><h2>Featured Collections</h2><span class="view" onclick="go('collections')">View All ›</span></div><div class="collectionRow">${collections.map((c,i)=>`<div class="collection" onclick="currentCat=cats[i%cats.length];go('products')">${jewelrySVG(c.includes('Earring')?'Earrings':cats[i%cats.length],i,theme==='light'?'light':'dark')}<div class="name">${c}</div></div>`).join('')}</div><div class="banner" onclick="go('products')"><div class="gift">☼</div><div><b>Exclusive Designs. Just for You.</b><small>${TOTAL_PHOTOS.toLocaleString('en-IN')} offline photos/designs added • no price/purchase</small></div><span style="margin-left:auto;color:var(--gold);font-size:28px">›</span></div>`}
          function categories(){return `${top()}<div class="pageTitle">Categories</div><div class="subText">150 photos/designs in every category • total 1,500</div><div class="grid">${cats.map((c,i)=>`<div class="product" onclick="currentCat='${c}';visibleCount=120;go('products')">${jewelrySVG(c,i,theme==='light'?'light':'dark')}<div class="pname">${c}</div><div class="ptype">150 gold photos</div></div>`).join('')}</div>`}
          function products(){let full=items(TOTAL_PHOTOS);let arr=full.slice(0,visibleCount);return `${top()}${searchBox()}<div class="rowTitle"><div><div class="pageTitle">${currentCat==='All'?'All Jewellery':currentCat}</div><div class="subText">${full.length.toLocaleString('en-IN')} photos/designs added • showing ${arr.length.toLocaleString('en-IN')} smooth</div></div><button class="btn" onclick="go('filter')">☰ Filter</button></div><div class="pillbar"><button class="chip ${currentCat==='All'?'active':''}" onclick="currentCat='All';visibleCount=120;render()">All</button>${cats.map(c=>`<button class="chip ${currentCat===c?'active':''}" onclick="currentCat='${c}';visibleCount=120;render()">${c}</button>`).join('')}</div><div class="grid three">${arr.map((p,i)=>`<div class="product" onclick="openDetail('${p.id}')"><div class="heart" onclick="event.stopPropagation();toggleWish('${p.id}');">${wishHas(p.id)?'♥':'♡'}</div>${jewelrySVG(p.cat,p.idx,theme==='light'?'light':'dark')}<div class="pname">${p.name}</div><div class="ptype">${p.cat}</div></div>`).join('')}</div>${arr.length<full.length?`<div style="text-align:center;margin:18px 0 8px"><button class="goldBtn" onclick="loadMore()">Load More Photos (${full.length-arr.length} left)</button></div>`:''}`}
          function collectionsPage(){return `${top()}<div class="pageTitle">Collections</div><div class="subText">Timeless Designs. Treasured Forever.</div><div>${collections.concat(['Bridal Collection','Royal Collection','Temple Collection','Everyday Gold']).map((c,i)=>`<div class="collection" style="width:100%;height:150px;margin-bottom:12px" onclick="currentCat=cats[i%cats.length];go('products')">${jewelrySVG(cats[i%cats.length],i,theme==='light'?'light':'dark')}<div class="name" style="font-size:25px">${c}<br><span style="font-size:13px;color:var(--muted)">Explore ${cats[i%cats.length]}</span></div></div>`).join('')}</div>`}
          function wishlist(){let ids=JSON.parse(localStorage.kj_wish||'[]');let arr=items(120).filter(x=>ids.includes(x.id)); if(!arr.length) arr=items(9); return `${top()}<div class="pageTitle">Wishlist</div><div class="subText">Your cherished gold pieces saved with love.</div><div class="grid three">${arr.map((p,i)=>`<div class="product" onclick="openDetail('${p.id}')"><div class="heart">♥</div>${jewelrySVG(p.cat,p.idx,theme==='light'?'light':'dark')}<div class="pname">${p.name}</div><div class="ptype">${p.cat}</div></div>`).join('')}</div>`}
          function account(){return `${top()}<div class="settingsCard"><div style="display:flex;gap:14px;align-items:center"><div class="catpic">${jewelrySVG('Necklaces',1,theme==='light'?'light':'dark')}</div><div><div class="pageTitle" style="font-size:28px;margin:0">Krishan Jewelera</div><div class="subText" style="margin:3px 0">Gold jewellery catalogue app</div></div></div></div><div class="settingsCard"><h2 style="margin-top:0">Theme Settings</h2><div class="themeOpt"><button class="${theme==='dark'?'goldBtn':'whiteBtn'}" onclick="setTheme('dark')">Black Gold</button><button class="${theme==='light'?'goldBtn':'whiteBtn'}" onclick="setTheme('light')">White Gold</button></div></div><div class="list"><div class="listItem" onclick="toast('Contact details baad me add honge')"><div class="listIcon">☎</div><div><b>Contact Details</b><br><span class="subText">Phone, WhatsApp, email placeholder ready</span></div></div><div class="listItem" onclick="toast('Location baad me add hoga')"><div class="listIcon">⌖</div><div><b>Store Location</b><br><span class="subText">Google Maps/location placeholder ready</span></div></div><div class="listItem" onclick="toast('Photo API ready')"><div class="listIcon">☁</div><div><b>1500 Offline Photos Added</b><br><span class="subText">1500 generated gold jewellery photos/designs included</span></div></div><div class="listItem" onclick="go('products')"><div class="listIcon">▦</div><div><b>All Categories</b><br><span class="subText">Ring, chain, bracelet, necklace separate</span></div></div></div>`}
          function filterPage(){return `${top()}<div class="pageTitle">Filters</div><h2>Categories</h2><div class="pillbar" style="flex-wrap:wrap;overflow:visible">${cats.map(c=>`<button class="chip ${currentCat===c?'active':''}" onclick="currentCat='${c}';go('products')">${c}</button>`).join('')}</div><h2>Sort By</h2><div class="pillbar" style="flex-wrap:wrap;overflow:visible"><button class="chip active">Newest First</button><button class="chip">Popular</button><button class="chip">Trending</button><button class="chip">Customer Rating</button></div><div class="fixedActions"><button class="whiteBtn" onclick="go('products')">Cancel</button><button class="goldBtn" onclick="go('products')">Apply Filters</button></div>`}
          function detail(id){let all=items(TOTAL_PHOTOS);let p=all.find(x=>x.id===id)||all[0];let imgs=[0,1,2,3].map(n=>jewelrySVG(p.cat,p.idx+n,theme==='light'?'light':'dark'));return `${top()}<div class="detailImg" id="detailHero"><div class="slides" style="transform:translateX(${-activeDetail*100}%)">${imgs.map(s=>`<div style="min-width:100%">${s}</div>`).join('')}</div><div class="dots">${imgs.map((_,i)=>`<span class="dot ${i===activeDetail?'active':''}"></span>`).join('')}</div></div><h1 class="pageTitle">${p.name}</h1><div class="subText">Price, purchase, amount and purity removed as requested.</div><div class="detailInfo"><div class="infoItem"><b>Collection</b><span>Heritage Collection</span></div><div class="infoItem"><b>Category</b><span>${p.cat}</span></div><div class="infoItem"><b>Gold Item</b><span>Handcrafted design</span></div><div class="infoItem"><b>Photo Swipe</b><span>Right-left working</span></div></div><h2>Description</h2><p class="subText" style="line-height:1.55">A timeless expression of tradition and grandeur. This screen is smooth and lightweight, made for large jewellery catalogues with cloud photo loading.</p><div class="fixedActions"><button class="whiteBtn" onclick="toggleWish('${p.id}')">♡ Add to Wishlist</button><button class="goldBtn" onclick="go('account')">Contact Store</button></div>`}
          function nav(){const ns=[['home','⌂','Home'],['categories','▦','Categories'],['collections','✤','Collections'],['wishlist','♡','Wishlist'],['account','♙','Account']];bottom.innerHTML=ns.map(n=>`<div class="nav ${page===n[0]?'active':''}" onclick="go('${n[0]}')"><div class="ni">${n[1]}</div><div>${n[2]}</div></div>`).join('')}
          function render(){screen.scrollTop=0; nav(); if(page==='home')screen.innerHTML=home(); else if(page==='categories')screen.innerHTML=categories(); else if(page==='products')screen.innerHTML=products(); else if(page==='collections')screen.innerHTML=collectionsPage(); else if(page==='wishlist')screen.innerHTML=wishlist(); else if(page==='account')screen.innerHTML=account(); else if(page==='filter')screen.innerHTML=filterPage(); else if(page.startsWith('detail:'))screen.innerHTML=detail(page.split(':')[1]); setTimeout(bindSwipes,80)}
          function go(p){if(p==='products'&&page!=='products')visibleCount=120;page=p;render()} function loadMore(){visibleCount=Math.min(visibleCount+120,TOTAL_PHOTOS);render()} function openDetail(id){activeDetail=0;go('detail:'+id)} function setTheme(t){theme=t;localStorage.kj_theme=t;document.body.classList.toggle('light',t==='light');render();toast(t==='dark'?'Black Gold theme':'White Gold theme')} function wishHas(id){return JSON.parse(localStorage.kj_wish||'[]').includes(id)} function toggleWish(id){let a=JSON.parse(localStorage.kj_wish||'[]'); if(a.includes(id))a=a.filter(x=>x!==id); else a.push(id); localStorage.kj_wish=JSON.stringify(a); toast('Wishlist updated'); render()} function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1700)}
          function swipe(el,onLeft,onRight){let sx=0,sy=0;el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});el.addEventListener('touchend',e=>{let dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){dx<0?onLeft():onRight()}},{passive:true})}
          function bindSwipes(){let h=document.getElementById('hero'); if(h) swipe(h,()=>{activeHero=(activeHero+1)%heroSlides.length;render()},()=>{activeHero=(activeHero+heroSlides.length-1)%heroSlides.length;render()}); let d=document.getElementById('detailHero'); if(d) swipe(d,()=>{activeDetail=(activeDetail+1)%4;render()},()=>{activeDetail=(activeDetail+3)%4;render()})}
          setInterval(()=>{if(page==='home'){activeHero=(activeHero+1)%heroSlides.length;render()}},5000); render();
          </script></body></html>
          EOF

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p output
          cp app/build/outputs/apk/debug/app-debug.apk output/KRISHAN-JEWELERA-1500-PHOTOS-SMOOTH.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KRISHAN-JEWELERA-1500-PHOTOS-SMOOTH-APK
          path: output/KRISHAN-JEWELERA-1500-PHOTOS-SMOOTH.apk
