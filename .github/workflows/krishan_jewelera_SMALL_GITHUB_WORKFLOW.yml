name: Build Krishan Jewelera APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Krishan Jewelera Android project
        shell: bash
        run: |
          set -e
          mkdir -p app/src/main/java/com/krishanjewelera/app
          mkdir -p app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-mdpi

          cat > settings.gradle <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name='Krishan Jewelera'
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.6.1' apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }

          android {
              namespace 'com.krishanjewelera.app'
              compileSdk 35
              defaultConfig {
                  applicationId 'com.krishanjewelera.app'
                  minSdk 23
                  targetSdk 35
                  versionCode 1
                  versionName '1.0'
              }
          }
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:theme="@style/AppTheme" android:label="Krishan Jewelera" android:allowBackup="true" android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:screenOrientation="portrait" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">serif</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:colorAccent">#D5A133</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/java/com/krishanjewelera/app/MainActivity.java <<'EOF'
          package com.krishanjewelera.app;

          import android.app.Activity;
          import android.os.Bundle;
          import android.content.*;
          import android.graphics.*;
          import android.graphics.drawable.*;
          import android.text.*;
          import android.view.*;
          import android.view.inputmethod.EditorInfo;
          import android.widget.*;
          import java.util.*;

          public class MainActivity extends Activity {
              final int GOLD = Color.rgb(213,161,51);
              final int GOLD2 = Color.rgb(255,204,82);
              final int BROWN = Color.rgb(59,34,21);
              boolean dark;
              LinearLayout main;
              String page = "Home";
              String selectedCategory = "All";
              ArrayList<Product> products = new ArrayList<>();
              HashSet<String> wishlist = new HashSet<>();
              SharedPreferences prefs;
              float downX;
              int heroIndex = 0;
              String[] heroTitles = {"Crafted in Gold, Worn with Pride.", "Timeless Gold. Treasured Always.", "Heritage Designs for Every Moment."};

              static class Product {
                  String id, name, category, collection, weight, desc;
                  Product(String i, String n, String c, String co, String w){
                      id=i; name=n; category=c; collection=co; weight=w;
                      desc="Handcrafted gold jewellery design for weddings, festivals, gifting and daily elegance. Contact Krishan Jewelera for more details.";
                  }
              }

              @Override public void onCreate(Bundle b){
                  super.onCreate(b);
                  prefs = getSharedPreferences("krishan", MODE_PRIVATE);
                  dark = prefs.getBoolean("dark", true);
                  wishlist.addAll(prefs.getStringSet("wishlist", new HashSet<String>()));
                  seedProducts();
                  renderHome();
              }

              void seedProducts(){
                  String[] cats = {"Necklaces","Earrings","Bangles","Rings","Pendants","Chains","Bracelets","Mangalsutra","Anklets","Kids Gold"};
                  String[] cols = {"Royal Heritage","Classic Elegance","Temple Collection","Festive Collection","Radiance","Daily Wear","Wedding Collection","Antique Gold"};
                  int id=1;
                  for(String c: cats){
                      for(int i=0;i<18;i++){
                          String n = (i%3==0?"Regal ":i%3==1?"Heritage ":"Classic ") + c.replace("s","") + " Design " + (i+1);
                          products.add(new Product("P"+(id++), n, c, cols[i%cols.length], String.format(Locale.US,"Approx. %.3f g", 8.5 + (i*2.7))));
                      }
                  }
              }

              int bg(){ return dark ? Color.BLACK : Color.rgb(255,253,248); }
              int card(){ return dark ? Color.rgb(12,12,10) : Color.rgb(255,250,240); }
              int txt(){ return dark ? Color.rgb(250,235,200) : Color.rgb(55,30,18); }
              int sub(){ return dark ? Color.rgb(190,176,150) : Color.rgb(120,100,83); }
              GradientDrawable round(int color, float radius, int strokeColor, int strokeDp){
                  GradientDrawable g = new GradientDrawable(); g.setColor(color); g.setCornerRadius(dp(radius));
                  if(strokeDp>0) g.setStroke(dp(strokeDp), strokeColor); return g;
              }
              int dp(float v){ return (int)(v*getResources().getDisplayMetrics().density + 0.5f); }
              TextView tv(String s, float sp, int color, int style){ TextView t=new TextView(this); t.setText(s); t.setTextSize(sp); t.setTextColor(color); t.setTypeface(Typeface.SERIF, style); t.setIncludeFontPadding(true); return t; }
              TextView btn(String s){ TextView b=tv(s,16,txt(),Typeface.NORMAL); b.setGravity(Gravity.CENTER); b.setPadding(dp(14),dp(10),dp(14),dp(10)); b.setBackground(round(Color.TRANSPARENT,16,GOLD,1)); return b; }
              void setRoot(){
                  LinearLayout root = new LinearLayout(this); root.setOrientation(LinearLayout.VERTICAL); root.setBackgroundColor(bg());
                  setContentView(root);
                  ScrollView sv = new ScrollView(this); main = new LinearLayout(this); main.setOrientation(LinearLayout.VERTICAL); main.setPadding(dp(14),dp(14),dp(14),dp(14));
                  sv.addView(main); root.addView(sv, new LinearLayout.LayoutParams(-1,0,1)); root.addView(bottomNav());
              }
              void header(){
                  LinearLayout row = new LinearLayout(this); row.setGravity(Gravity.CENTER_VERTICAL); row.setPadding(0,dp(6),0,dp(8));
                  TextView left = tv(page.equals("Home")?"☰":"‹",30,GOLD,Typeface.BOLD); left.setGravity(Gravity.CENTER); left.setOnClickListener(v->renderHome());
                  TextView logo = tv("♕\nKRISHAN\nJEWELERA",26,GOLD,Typeface.BOLD); logo.setGravity(Gravity.CENTER); logo.setLineSpacing(0,0.9f);
                  TextView right = tv("♡",30,GOLD,Typeface.NORMAL); right.setGravity(Gravity.CENTER); right.setOnClickListener(v->renderWishlist());
                  row.addView(left,new LinearLayout.LayoutParams(dp(48),dp(90))); row.addView(logo,new LinearLayout.LayoutParams(0,dp(90),1)); row.addView(right,new LinearLayout.LayoutParams(dp(48),dp(90)));
                  main.addView(row);
              }
              LinearLayout bottomNav(){
                  LinearLayout nav = new LinearLayout(this); nav.setGravity(Gravity.CENTER); nav.setPadding(dp(4),dp(8),dp(4),dp(8)); nav.setBackgroundColor(dark?Color.BLACK:Color.WHITE);
                  addNav(nav,"⌂\nHome",()->renderHome()); addNav(nav,"▦\nCategories",()->renderCategories()); addNav(nav,"✥\nCollections",()->renderCollections()); addNav(nav,"♡\nWishlist",()->renderWishlist()); addNav(nav,"♙\nAccount",()->renderAccount());
                  return nav;
              }
              void addNav(LinearLayout nav, String label, final Runnable r){ TextView v=tv(label,13,label.contains(page)?GOLD:sub(),Typeface.NORMAL); v.setGravity(Gravity.CENTER); v.setOnClickListener(x->r.run()); nav.addView(v,new LinearLayout.LayoutParams(0,dp(62),1)); }

              void searchBar(String initial){
                  EditText e = new EditText(this); e.setText(initial==null?"":initial); e.setSingleLine(true); e.setHint("Search for gold jewellery"); e.setHintTextColor(sub()); e.setTextColor(txt()); e.setTextSize(16); e.setImeOptions(EditorInfo.IME_ACTION_SEARCH); e.setPadding(dp(14),0,dp(14),0); e.setBackground(round(card(),18,GOLD,1));
                  e.setCompoundDrawablesWithIntrinsicBounds(0,0,android.R.drawable.ic_menu_camera,0);
                  e.setOnEditorActionListener((v,action,event)->{ renderListing(e.getText().toString()); return true; });
                  e.addTextChangedListener(new TextWatcher(){ public void beforeTextChanged(CharSequence s,int st,int c,int a){} public void onTextChanged(CharSequence s,int st,int b,int c){} public void afterTextChanged(Editable ed){ if(ed.length()==0 && page.equals("Search")) renderListing(""); }});
                  main.addView(e,new LinearLayout.LayoutParams(-1,dp(56))); spacer(14);
              }
              void spacer(int h){ Space s = new Space(this); main.addView(s,new LinearLayout.LayoutParams(1,dp(h))); }

              void renderHome(){ page="Home"; setRoot(); header(); searchBar(""); hero(); sectionTitle("Shop by Category", "View All", ()->renderCategories()); catCircles(); sectionTitle("Featured Collections", "View All", ()->renderCollections()); collectionRow(); promo(); }
              void hero(){
                  LinearLayout h = new LinearLayout(this); h.setOrientation(LinearLayout.HORIZONTAL); h.setGravity(Gravity.CENTER_VERTICAL); h.setPadding(dp(16),dp(18),dp(10),dp(18)); h.setBackground(round(card(),18,GOLD,1));
                  TextView t=tv(heroTitles[heroIndex]+"\n\nDiscover tradition and elegance.\n\nEXPLORE COLLECTIONS  ›",25,txt(),Typeface.BOLD); h.addView(t,new LinearLayout.LayoutParams(0,dp(210),1));
                  JewelryView j = new JewelryView(this,"Necklaces",dark,heroIndex); h.addView(j,new LinearLayout.LayoutParams(dp(160),dp(190)));
                  h.setOnTouchListener((v,e)->{ if(e.getAction()==MotionEvent.ACTION_DOWN) downX=e.getX(); if(e.getAction()==MotionEvent.ACTION_UP && Math.abs(e.getX()-downX)>dp(40)){ heroIndex=(heroIndex+(e.getX()<downX?1:2))%3; renderHome(); } return true; });
                  main.addView(h,new LinearLayout.LayoutParams(-1,dp(245))); spacer(14);
              }
              void sectionTitle(String a, String b, final Runnable r){
                  LinearLayout row = new LinearLayout(this); row.setGravity(Gravity.CENTER_VERTICAL); TextView l=tv(a,22,txt(),Typeface.BOLD); TextView rr=tv(b+"  ›",16,GOLD,Typeface.BOLD); rr.setGravity(Gravity.RIGHT); rr.setOnClickListener(v->r.run()); row.addView(l,new LinearLayout.LayoutParams(0,dp(42),1)); row.addView(rr,new LinearLayout.LayoutParams(dp(120),dp(42))); main.addView(row);
              }
              void catCircles(){
                  HorizontalScrollView hs = new HorizontalScrollView(this); hs.setHorizontalScrollBarEnabled(false); LinearLayout row=new LinearLayout(this);
                  String[] cats={"Necklaces","Earrings","Bangles","Rings","Pendants","Chains","Bracelets"};
                  for(String c: cats){ LinearLayout box=new LinearLayout(this); box.setOrientation(LinearLayout.VERTICAL); box.setGravity(Gravity.CENTER); box.setPadding(dp(4),0,dp(4),0); JewelryView j=new JewelryView(this,c,dark,0); j.setBackground(round(card(),60,GOLD,1)); TextView name=tv(c,14,txt(),Typeface.NORMAL); name.setGravity(Gravity.CENTER); box.addView(j,new LinearLayout.LayoutParams(dp(82),dp(82))); box.addView(name,new LinearLayout.LayoutParams(dp(96),dp(36))); box.setOnClickListener(v->{ selectedCategory=c; renderListing(""); }); row.addView(box); }
                  hs.addView(row); main.addView(hs); spacer(16);
              }
              void collectionRow(){
                  HorizontalScrollView hs=new HorizontalScrollView(this); hs.setHorizontalScrollBarEnabled(false); LinearLayout row=new LinearLayout(this); String[] cs={"Royal Heritage","Classic Elegance","Temple Collection","Festive Collection","Radiance"};
                  for(int i=0;i<cs.length;i++){ LinearLayout cardv=new LinearLayout(this); cardv.setOrientation(LinearLayout.VERTICAL); cardv.setPadding(dp(8),dp(8),dp(8),dp(8)); cardv.setBackground(round(card(),12,GOLD,1)); JewelryView img=new JewelryView(this,i%2==0?"Necklaces":"Bangles",dark,i); TextView name=tv(cs[i],18,GOLD,Typeface.BOLD); cardv.addView(img,new LinearLayout.LayoutParams(dp(155),dp(120))); cardv.addView(name); final String col=cs[i]; cardv.setOnClickListener(v->renderCollectionDetail(col)); LinearLayout.LayoutParams lp=new LinearLayout.LayoutParams(dp(175),dp(190)); lp.setMargins(0,0,dp(12),0); row.addView(cardv,lp); }
                  hs.addView(row); main.addView(hs); spacer(16);
              }
              void promo(){ TextView p=tv("🎁  Exclusive Designs. Just for You.\nDiscover new arrivals and special creations.",17,txt(),Typeface.BOLD); p.setPadding(dp(18),dp(14),dp(18),dp(14)); p.setBackground(round(card(),18,GOLD,1)); main.addView(p); }

              void renderCategories(){ page="Categories"; setRoot(); header(); String[] cats={"Necklaces","Earrings","Bangles","Rings","Pendants","Chains","Bracelets","Mangalsutra","Anklets","Kids Gold"}; GridLayout grid=new GridLayout(this); grid.setColumnCount(2); for(String c:cats){ LinearLayout cardv=new LinearLayout(this); cardv.setOrientation(LinearLayout.VERTICAL); cardv.setPadding(dp(10),dp(8),dp(10),dp(8)); cardv.setBackground(round(card(),14,GOLD,1)); JewelryView img=new JewelryView(this,c,dark,0); TextView n=tv(c+"   ›",21,txt(),Typeface.BOLD); cardv.addView(img,new LinearLayout.LayoutParams(-1,dp(130))); cardv.addView(n); cardv.setOnClickListener(v->{selectedCategory=c; renderListing("");}); GridLayout.LayoutParams gp=new GridLayout.LayoutParams(); gp.width=(getResources().getDisplayMetrics().widthPixels-dp(44))/2; gp.height=dp(210); gp.setMargins(dp(4),dp(6),dp(4),dp(6)); grid.addView(cardv,gp);} main.addView(grid); }

              void renderListing(String query){ page="Search"; setRoot(); header(); searchBar(query); LinearLayout top=new LinearLayout(this); top.setGravity(Gravity.CENTER_VERTICAL); TextView title=tv((query==null||query.length()==0?selectedCategory: "Results for \""+query+"\""),25,txt(),Typeface.BOLD); TextView filter=btn("Filter"); filter.setOnClickListener(v->renderFilters()); top.addView(title,new LinearLayout.LayoutParams(0,dp(56),1)); top.addView(filter,new LinearLayout.LayoutParams(dp(110),dp(48))); main.addView(top); chips(); GridLayout grid=new GridLayout(this); grid.setColumnCount(2); ArrayList<Product> list=filterProducts(query); for(Product p:list){ grid.addView(productCard(p),gridLp()); } main.addView(grid); }
              ArrayList<Product> filterProducts(String q){ ArrayList<Product> out=new ArrayList<>(); String qq=q==null?"":q.toLowerCase(Locale.US); for(Product p:products){ boolean c=selectedCategory.equals("All")||p.category.equals(selectedCategory); boolean m=qq.length()==0 || p.name.toLowerCase(Locale.US).contains(qq)||p.category.toLowerCase(Locale.US).contains(qq)||p.collection.toLowerCase(Locale.US).contains(qq); if(c&&m) out.add(p); if(out.size()>=80) break;} return out; }
              GridLayout.LayoutParams gridLp(){ GridLayout.LayoutParams gp=new GridLayout.LayoutParams(); gp.width=(getResources().getDisplayMetrics().widthPixels-dp(44))/2; gp.height=dp(238); gp.setMargins(dp(4),dp(6),dp(4),dp(8)); return gp; }
              void chips(){ HorizontalScrollView hs=new HorizontalScrollView(this); LinearLayout row=new LinearLayout(this); String[] cats={"All","Necklaces","Earrings","Bangles","Rings","Pendants","Chains","Bracelets"}; for(String c:cats){ TextView ch=btn(c); if(c.equals(selectedCategory)) ch.setBackground(round(GOLD,18,GOLD,1)); ch.setTextColor(c.equals(selectedCategory)?Color.BLACK:txt()); ch.setOnClickListener(v->{selectedCategory=c;renderListing("");}); LinearLayout.LayoutParams lp=new LinearLayout.LayoutParams(dp(115),dp(44)); lp.setMargins(0,0,dp(8),0); row.addView(ch,lp);} hs.addView(row); main.addView(hs); spacer(10); }
              View productCard(Product p){ LinearLayout c=new LinearLayout(this); c.setOrientation(LinearLayout.VERTICAL); c.setPadding(dp(8),dp(8),dp(8),dp(8)); c.setBackground(round(card(),12,GOLD,1)); JewelryView img=new JewelryView(this,p.category,dark,p.id.hashCode()); TextView heart=tv(wishlist.contains(p.id)?"♥":"♡",24,GOLD,Typeface.BOLD); heart.setGravity(Gravity.RIGHT); heart.setOnClickListener(v->{toggleWish(p); renderListing("");}); TextView name=tv(p.name,16,txt(),Typeface.BOLD); TextView cat=tv(p.category+" • "+p.collection,13,sub(),Typeface.NORMAL); c.addView(heart,new LinearLayout.LayoutParams(-1,dp(30))); c.addView(img,new LinearLayout.LayoutParams(-1,dp(118))); c.addView(name); c.addView(cat); c.setOnClickListener(v->renderDetail(p,0)); return c; }
              void toggleWish(Product p){ if(wishlist.contains(p.id)) wishlist.remove(p.id); else wishlist.add(p.id); prefs.edit().putStringSet("wishlist",new HashSet<>(wishlist)).apply(); }

              void renderDetail(Product p, int variant){ page="Details"; setRoot(); header(); JewelryView img=new JewelryView(this,p.category,dark,variant); img.setBackground(round(card(),20,GOLD,1)); img.setOnTouchListener((v,e)->{ if(e.getAction()==MotionEvent.ACTION_DOWN) downX=e.getX(); if(e.getAction()==MotionEvent.ACTION_UP && Math.abs(e.getX()-downX)>dp(35)) renderDetail(p,variant+1); return true; }); main.addView(img,new LinearLayout.LayoutParams(-1,dp(330))); spacer(12); TextView name=tv(p.name,28,txt(),Typeface.BOLD); main.addView(name); LinearLayout actions=new LinearLayout(this); TextView w=btn(wishlist.contains(p.id)?"♥ Remove Wishlist":"♡ Add Wishlist"); w.setOnClickListener(v->{toggleWish(p);renderDetail(p,variant);}); TextView c=btn("Contact Store"); c.setOnClickListener(v->renderContact()); actions.addView(w,new LinearLayout.LayoutParams(0,dp(54),1)); actions.addView(c,new LinearLayout.LayoutParams(0,dp(54),1)); main.addView(actions); spacer(14); info("Collection",p.collection); info("Category",p.category); info("Weight",p.weight); info("Craftsmanship","Handcrafted"); spacer(10); TextView d=tv("Description\n"+p.desc+"\n\nSwipe image right-left to view more angles.",17,txt(),Typeface.NORMAL); d.setPadding(dp(12),dp(12),dp(12),dp(12)); d.setBackground(round(card(),12,GOLD,1)); main.addView(d); }
              void info(String a,String b){ TextView i=tv(a+"\n"+b,16,txt(),Typeface.NORMAL); i.setPadding(dp(14),dp(10),dp(14),dp(10)); i.setBackground(round(card(),10,dark?Color.rgb(80,60,30):Color.rgb(238,220,180),1)); LinearLayout.LayoutParams lp=new LinearLayout.LayoutParams(-1,dp(76)); lp.setMargins(0,0,0,dp(7)); main.addView(i,lp); }

              void renderCollections(){ page="Collections"; setRoot(); header(); String[] cs={"Wedding Collection","Royal Collection","Temple Collection","Festive Collection","Heritage Collection","Radiance Collection","Daily Wear"}; for(String c:cs){ LinearLayout box=new LinearLayout(this); box.setPadding(dp(16),dp(10),dp(10),dp(10)); box.setGravity(Gravity.CENTER_VERTICAL); box.setBackground(round(card(),12,GOLD,1)); TextView t=tv(c+"\nGold designs separated by category  ›",23,txt(),Typeface.BOLD); JewelryView j=new JewelryView(this,"Necklaces",dark,c.hashCode()); box.addView(t,new LinearLayout.LayoutParams(0,dp(110),1)); box.addView(j,new LinearLayout.LayoutParams(dp(130),dp(110))); box.setOnClickListener(v->renderCollectionDetail(c)); LinearLayout.LayoutParams lp=new LinearLayout.LayoutParams(-1,dp(138)); lp.setMargins(0,0,0,dp(10)); main.addView(box,lp); } }
              void renderCollectionDetail(String col){ selectedCategory="All"; page="Search"; setRoot(); header(); TextView title=tv(col,28,txt(),Typeface.BOLD); main.addView(title); spacer(8); GridLayout grid=new GridLayout(this); grid.setColumnCount(2); for(Product p:products){ if(p.collection.equals(col.replace(" Collection",""))||p.collection.contains(col.split(" ")[0])) grid.addView(productCard(p),gridLp()); } if(grid.getChildCount()==0) for(int i=0;i<20;i++) grid.addView(productCard(products.get(i)),gridLp()); main.addView(grid); }
              void renderWishlist(){ page="Wishlist"; setRoot(); header(); TextView h=tv("Wishlist\nYour cherished gold pieces saved with love.",26,txt(),Typeface.BOLD); main.addView(h); spacer(8); GridLayout grid=new GridLayout(this); grid.setColumnCount(2); for(Product p:products){ if(wishlist.contains(p.id)) grid.addView(productCard(p),gridLp()); } if(grid.getChildCount()==0){ TextView empty=tv("No wishlist yet. Tap heart on any item.",18,sub(),Typeface.NORMAL); main.addView(empty); } else main.addView(grid); }
              void renderFilters(){ page="Filters"; setRoot(); header(); TextView h=tv("Filters",28,txt(),Typeface.BOLD); main.addView(h); chips(); String[] sorts={"Newest First","Popular","Bestselling","Customer Rating"}; for(String s:sorts){ TextView b=btn(s); b.setOnClickListener(v->renderListing("")); LinearLayout.LayoutParams lp=new LinearLayout.LayoutParams(-1,dp(54)); lp.setMargins(0,0,0,dp(8)); main.addView(b,lp);} }
              void renderAccount(){ page="Account"; setRoot(); header(); TextView u=tv("Krishan Jewelera\nGold catalogue app",26,txt(),Typeface.BOLD); u.setPadding(dp(16),dp(16),dp(16),dp(16)); u.setBackground(round(card(),14,GOLD,1)); main.addView(u); spacer(12); menu("Theme Change",()->renderSettings()); menu("Contact Details",()->renderContact()); menu("Store Location",()->renderLocation()); menu("Wishlist",()->renderWishlist()); menu("Notifications",()->toast("Notifications ready")); menu("Help & Support",()->renderContact()); }
              void menu(String label, final Runnable r){ TextView m=tv(label+"  ›",22,txt(),Typeface.NORMAL); m.setPadding(dp(16),dp(14),dp(16),dp(14)); m.setBackground(round(card(),10,GOLD,1)); m.setOnClickListener(v->r.run()); LinearLayout.LayoutParams lp=new LinearLayout.LayoutParams(-1,dp(66)); lp.setMargins(0,0,0,dp(8)); main.addView(m,lp); }
              void renderSettings(){ page="Settings"; setRoot(); header(); TextView h=tv("Theme Settings",28,txt(),Typeface.BOLD); main.addView(h); spacer(12); TextView black=btn("Black Gold Theme"); black.setOnClickListener(v->{dark=true;prefs.edit().putBoolean("dark",true).apply();renderSettings();}); TextView white=btn("White Gold Theme"); white.setOnClickListener(v->{dark=false;prefs.edit().putBoolean("dark",false).apply();renderSettings();}); main.addView(black,new LinearLayout.LayoutParams(-1,dp(60))); spacer(10); main.addView(white,new LinearLayout.LayoutParams(-1,dp(60))); }
              void renderContact(){ page="Contact"; setRoot(); header(); TextView h=tv("Contact Details\n\nPhone / WhatsApp: Add later\nEmail: Add later\nInstagram: Add later\n\nThis section is ready. Send your final contact details and it can be updated.",20,txt(),Typeface.NORMAL); h.setPadding(dp(16),dp(16),dp(16),dp(16)); h.setBackground(round(card(),14,GOLD,1)); main.addView(h); }
              void renderLocation(){ page="Location"; setRoot(); header(); TextView h=tv("Store Location\n\nAddress: Add later\nGoogle Map Link: Add later\nCity: Add later\n\nLocation section is ready.",20,txt(),Typeface.NORMAL); h.setPadding(dp(16),dp(16),dp(16),dp(16)); h.setBackground(round(card(),14,GOLD,1)); main.addView(h); }
              void toast(String s){ Toast.makeText(this,s,Toast.LENGTH_SHORT).show(); }

              static class JewelryView extends View {
                  Paint p = new Paint(1); String cat; boolean dark; int variant;
                  JewelryView(Context c,String ca,boolean d,int v){ super(c); cat=ca; dark=d; variant=v; }
                  @Override protected void onDraw(Canvas c){ super.onDraw(c); int w=getWidth(), h=getHeight(); Paint bg=new Paint(1); LinearGradient lg=new LinearGradient(0,0,w,h,dark?Color.rgb(8,8,7):Color.rgb(255,248,230),dark?Color.rgb(45,32,16):Color.rgb(245,224,182),Shader.TileMode.CLAMP); bg.setShader(lg); c.drawRoundRect(0,0,w,h,22,22,bg); p.setShader(null); p.setStrokeWidth(Math.max(3,w/80)); p.setStyle(Paint.Style.STROKE); p.setColor(Color.rgb(210,145,20)); if(cat.contains("Earring")){ drawEarrings(c,w,h); } else if(cat.contains("Bangle")||cat.contains("Bracelet")){ drawBangles(c,w,h); } else if(cat.contains("Ring")){ drawRing(c,w,h); } else if(cat.contains("Pendant")||cat.contains("Chain")||cat.contains("Mangalsutra")){ drawPendant(c,w,h); } else { drawNecklace(c,w,h); } }
                  void goldFill(){ p.setShader(new LinearGradient(0,0,getWidth(),getHeight(),Color.rgb(255,215,83),Color.rgb(175,105,0),Shader.TileMode.CLAMP)); p.setStyle(Paint.Style.FILL); }
                  void stroke(){ p.setShader(null); p.setStyle(Paint.Style.STROKE); p.setColor(Color.rgb(245,180,35)); }
                  void bead(Canvas c,float x,float y,float r){ goldFill(); c.drawCircle(x,y,r,p); p.setShader(null); p.setStyle(Paint.Style.STROKE); p.setColor(Color.rgb(120,70,0)); c.drawCircle(x,y,r,p); }
                  void drawNecklace(Canvas c,int w,int h){ stroke(); RectF a=new RectF(w*.12f,h*.02f,w*.88f,h*.72f); c.drawArc(a,25,130,false,p); c.drawArc(new RectF(w*.18f,h*.10f,w*.82f,h*.70f),30,120,false,p); for(int i=0;i<18;i++){ double ang=Math.toRadians(30+i*7); bead(c,(float)(w*.5+Math.cos(Math.PI-ang)*w*.36),(float)(h*.08+Math.sin(ang)*h*.58),w*.025f); } bead(c,w*.5f,h*.72f,w*.12f); bead(c,w*.5f,h*.88f,w*.05f); }
                  void drawEarrings(Canvas c,int w,int h){ for(int side=0;side<2;side++){ float cx=side==0?w*.35f:w*.65f; bead(c,cx,h*.26f,w*.055f); bead(c,cx,h*.52f,w*.12f); for(int i=0;i<7;i++) bead(c,cx-w*.12f+i*w*.04f,h*.70f,w*.025f); }}
                  void drawBangles(Canvas c,int w,int h){ stroke(); for(int i=0;i<3;i++){ c.drawOval(new RectF(w*.15f+i*w*.08f,h*.25f+i*h*.04f,w*.75f+i*w*.08f,h*.75f+i*h*.04f),p); } for(int i=0;i<10;i++) bead(c,w*.25f+i*w*.05f,h*.52f,w*.018f); }
                  void drawRing(Canvas c,int w,int h){ stroke(); c.drawOval(new RectF(w*.25f,h*.35f,w*.75f,h*.85f),p); bead(c,w*.5f,h*.34f,w*.12f); bead(c,w*.5f,h*.34f,w*.045f); }
                  void drawPendant(Canvas c,int w,int h){ stroke(); c.drawLine(w*.25f,h*.05f,w*.5f,h*.35f,p); c.drawLine(w*.75f,h*.05f,w*.5f,h*.35f,p); bead(c,w*.5f,h*.58f,w*.16f); bead(c,w*.5f,h*.82f,w*.05f); for(int i=0;i<8;i++) bead(c,w*.36f+i*w*.04f,h*.75f,w*.018f); }
              }
          }
          EOF

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Build APK
        shell: bash
        run: |
          curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle.zip
          ./gradle-8.7/bin/gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: krishan-jewelera-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
