name: Build APK From Release ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download project ZIP from Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download krishna-app --pattern "Krishna_Jewelers_FIXED_FULL_APP.zip" --dir .
          ls -lh

      - name: Unzip Android project
        run: |
          unzip -q Krishna_Jewelers_FIXED_FULL_APP.zip -d project
          ls -la project

      - name: Build APK
        run: |
          cd project
          gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Krishna-Jewelers-Fixed-APK
          path: project/app/build/outputs/apk/debug/app-debug.apk
