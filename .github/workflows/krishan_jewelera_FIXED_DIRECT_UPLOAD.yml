name: Build FIXED Krishan Jewelera APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Create full Android app project
        run: |
          rm -rf app build.gradle settings.gradle gradle.properties
          mkdir -p app/src/main/java/com/krishanjewelera/app
          mkdir -p app/src/main/res/drawable app/src/main/res/mipmap-hdpi app/src/main/res/values
          cat > settings.gradle <<'EOF2'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name='KrishanJeweleraFixed'
          include ':app'
          EOF2
          cat > build.gradle <<'EOF2'
          plugins {
              id 'com.android.application' version '8.6.1' apply false
          }
          EOF2
          cat > gradle.properties <<'EOF2'
          android.useAndroidX=false
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          EOF2
          cat > app/build.gradle <<'EOF2'
          plugins { id 'com.android.application' }
          android { namespace 'com.krishanjewelera.app'; compileSdk 35
              defaultConfig { applicationId 'com.krishanjewelera.app'; minSdk 23; targetSdk 35; versionCode 3; versionName '3.0-fixed-smooth' }
          }
          EOF2
          cat > app/src/main/AndroidManifest.xml <<'EOF2'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:theme="@style/AppTheme" android:label="Krishan Jewelera" android:allowBackup="false" android:supportsRtl="true">
              <activity android:name=".MainActivity" android:screenOrientation="portrait" android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF2
          cat > app/src/main/res/values/styles.xml <<'EOF2'
          <resources><style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar"><item name="android:fontFamily">serif</item><item name="android:windowLightStatusBar">false</item></style></resources>
          EOF2
          cat > app/src/main/java/com/krishanjewelera/app/MainActivity.java <<'EOF2'
          package com.krishanjewelera.app;

          import android.app.*;import android.os.*;import android.content.*;import android.content.SharedPreferences;import android.graphics.*;import android.graphics.drawable.*;import android.text.*;import android.view.*;import android.view.animation.*;import android.widget.*;import java.util.*;

          public class MainActivity extends Activity{
            int gold=Color.rgb(218,161,44),gold2=Color.rgb(255,211,95),darkBg=Color.rgb(3,4,5),darkPanel=Color.rgb(17,17,15),lightBg=Color.rgb(255,252,246),lightPanel=Color.rgb(255,247,233),brown=Color.rgb(69,38,20);boolean dark=true;String screen="Home";LinearLayout root;ArrayList<Product> products=new ArrayList<>(),wishlist=new ArrayList<>();int hero=0;float downX;
            String[] cats={"Necklaces","Earrings","Bangles","Rings","Pendants","Chains","Bracelets","Mangalsutra","Anklets","Kids Gold"};String[] collections={"Heritage","Temple","Wedding","Festive","Royal","Daily Wear","Kids","Modern"};
            public void onCreate(Bundle b){super.onCreate(b);dark=getPreferences(0).getBoolean("dark",true);seed();showHome();}
            int bg(){return dark?darkBg:lightBg;}int panel(){return dark?darkPanel:lightPanel;}int txt(){return dark?Color.WHITE:brown;}int sub(){return dark?Color.rgb(195,180,155):Color.rgb(120,100,80);}int dp(float v){return (int)(v*getResources().getDisplayMetrics().density+0.5f);}TextView tv(String s,int sp,int c,int st){TextView t=new TextView(this);t.setText(s);t.setTextSize(sp);t.setTextColor(c);t.setTypeface(Typeface.create(Typeface.SERIF,st));t.setIncludeFontPadding(true);return t;}
            GradientDrawable box(int color,float r,int stroke){GradientDrawable g=new GradientDrawable();g.setColor(color);g.setCornerRadius(dp(r));if(stroke>0)g.setStroke(dp(1),gold);return g;}void pad(View v,int a){v.setPadding(dp(a),dp(a),dp(a),dp(a));}
            void base(String active){getWindow().setStatusBarColor(bg());getWindow().setNavigationBarColor(bg());root=new LinearLayout(this);root.setOrientation(LinearLayout.VERTICAL);root.setBackgroundColor(bg());setContentView(root);ScrollView sv=new ScrollView(this);sv.setFillViewport(false);LinearLayout content=new LinearLayout(this);content.setOrientation(LinearLayout.VERTICAL);pad(content,14);sv.addView(content);root.addView(sv,new LinearLayout.LayoutParams(-1,0,1));top(content);}
            void top(LinearLayout p){LinearLayout r=new LinearLayout(this);r.setGravity(Gravity.CENTER);r.setOrientation(LinearLayout.VERTICAL);TextView logo=tv("♛\nKRISHAN\nJEWELERA",26,gold,Typeface.BOLD);logo.setGravity(Gravity.CENTER);p.addView(logo,new LinearLayout.LayoutParams(-1,-2));LinearLayout search=new LinearLayout(this);search.setGravity(Gravity.CENTER_VERTICAL);search.setBackground(box(dark?Color.rgb(18,18,18):Color.WHITE,14,1));search.setPadding(dp(12),0,dp(12),0);TextView mag=tv("⌕",30,gold,Typeface.BOLD);search.addView(mag);EditText e=new EditText(this);e.setHint("Search gold jewellery");e.setHintTextColor(sub());e.setTextColor(txt());e.setSingleLine(true);e.setBackgroundColor(Color.TRANSPARENT);search.addView(e,new LinearLayout.LayoutParams(0,dp(54),1));TextView cam=tv("▣",26,gold,Typeface.BOLD);search.addView(cam);p.addView(search,new LinearLayout.LayoutParams(-1,dp(58)));e.setOnEditorActionListener((v,a,event)->{showList("All",e.getText().toString());return true;});e.addTextChangedListener(new TextWatcher(){public void beforeTextChanged(CharSequence s,int st,int c,int a){}public void onTextChanged(CharSequence s,int st,int b,int c){if(s.length()>2)showList("All",s.toString());}public void afterTextChanged(Editable e){}});}
            void bottom(String active){LinearLayout nav=new LinearLayout(this);nav.setGravity(Gravity.CENTER);nav.setBackgroundColor(bg());String[] n={"Home","Categories","Collections","Wishlist","Account"};String[] ic={"⌂","▦","✾","♡","♙"};for(int i=0;i<n.length;i++){final String x=n[i];TextView t=tv(ic[i]+"\n"+x,13,x.equals(active)?gold:sub(),Typeface.NORMAL);t.setGravity(Gravity.CENTER);t.setOnClickListener(v->{if(x.equals("Home"))showHome();else if(x.equals("Categories"))showCategories();else if(x.equals("Collections"))showCollections();else if(x.equals("Wishlist"))showWishlist();else showAccount();});nav.addView(t,new LinearLayout.LayoutParams(0,dp(70),1));}root.addView(nav,new LinearLayout.LayoutParams(-1,dp(76)));}
            public void showHome(){base("Home");LinearLayout c=(LinearLayout)((ScrollView)root.getChildAt(0)).getChildAt(0);FrameLayout heroView=heroCard(products.get(hero),true);c.addView(heroView,new LinearLayout.LayoutParams(-1,dp(250)));section(c,"Shop by Category",true,()->showCategories());HorizontalScrollView hs=new HorizontalScrollView(this);hs.setHorizontalScrollBarEnabled(false);LinearLayout row=new LinearLayout(this);for(String cat:cats){LinearLayout item=new LinearLayout(this);item.setOrientation(LinearLayout.VERTICAL);item.setGravity(Gravity.CENTER);JewelleryView j=new JewelleryView(this,shapeFor(cat),dark);item.addView(j,new LinearLayout.LayoutParams(dp(92),dp(92)));TextView label=tv(cat,14,txt(),Typeface.NORMAL);label.setGravity(Gravity.CENTER);item.addView(label);item.setOnClickListener(v->showList(cat,""));row.addView(item,new LinearLayout.LayoutParams(dp(112),-2));}hs.addView(row);c.addView(hs);section(c,"Featured Collections",true,()->showCollections());HorizontalScrollView h2=new HorizontalScrollView(this);h2.setHorizontalScrollBarEnabled(false);LinearLayout fr=new LinearLayout(this);for(int i=0;i<12;i++){Product p=products.get(i*3);FrameLayout card=miniCard(p);fr.addView(card,new LinearLayout.LayoutParams(dp(165),dp(170)));}h2.addView(fr);c.addView(h2);TextView note=tv("Exclusive Designs. Just for You.  •  Contact & location can be added in Settings.",16,txt(),Typeface.BOLD);note.setBackground(box(panel(),14,1));pad(note,14);c.addView(note,new LinearLayout.LayoutParams(-1,-2));bottom("Home");}
            FrameLayout heroCard(Product p,boolean swipe){FrameLayout f=new FrameLayout(this);f.setBackground(box(panel(),14,1));JewelleryView j=new JewelleryView(this,p.shape,dark);j.caption=p.name;f.addView(j,new FrameLayout.LayoutParams(-1,-1));TextView over=tv("Timeless Beauty\nCrafted in Gold, Worn with Pride.\n\nEXPLORE COLLECTIONS  ›",24,dark?gold2:brown,Typeface.BOLD);over.setShadowLayer(8,2,2,Color.BLACK);over.setPadding(dp(18),dp(20),0,0);f.addView(over);if(swipe){f.setOnTouchListener((v,e)->{if(e.getAction()==MotionEvent.ACTION_DOWN){downX=e.getX();return true;}if(e.getAction()==MotionEvent.ACTION_UP){float dx=e.getX()-downX;if(Math.abs(dx)>dp(40)){hero=(hero+(dx<0?1:products.size()-1))%products.size();showHome();}else showCollections();return true;}return true;});}return f;}
            void section(LinearLayout c,String s,boolean viewAll,final Runnable r){LinearLayout row=new LinearLayout(this);row.setGravity(Gravity.CENTER_VERTICAL);TextView a=tv(s,22,txt(),Typeface.BOLD);row.addView(a,new LinearLayout.LayoutParams(0,-2,1));TextView b=tv(viewAll?"View All  ›":"",16,gold,Typeface.BOLD);b.setOnClickListener(v->{if(r!=null)r.run();});row.addView(b);c.addView(row,new LinearLayout.LayoutParams(-1,-2));}
            FrameLayout miniCard(Product p){FrameLayout f=new FrameLayout(this);f.setPadding(dp(6),dp(8),dp(6),dp(8));LinearLayout box=new LinearLayout(this);box.setOrientation(LinearLayout.VERTICAL);box.setBackground(box(panel(),12,1));JewelleryView j=new JewelleryView(this,p.shape,dark);box.addView(j,new LinearLayout.LayoutParams(-1,0,1));TextView t=tv(p.collection+"\nCollection",16,dark?gold2:brown,Typeface.BOLD);t.setGravity(Gravity.CENTER);box.addView(t);box.setOnClickListener(v->showList(p.category,""));f.addView(box,new FrameLayout.LayoutParams(-1,-1));return f;}
            public void showCategories(){base("Categories");LinearLayout c=(LinearLayout)((ScrollView)root.getChildAt(0)).getChildAt(0);TextView title=tv("Categories",32,txt(),Typeface.BOLD);title.setGravity(Gravity.CENTER);c.addView(title);GridLayout g=new GridLayout(this);g.setColumnCount(2);for(String cat:cats){LinearLayout item=new LinearLayout(this);item.setOrientation(LinearLayout.VERTICAL);item.setBackground(box(panel(),14,1));JewelleryView j=new JewelleryView(this,shapeFor(cat),dark);item.addView(j,new LinearLayout.LayoutParams(-1,dp(135)));TextView l=tv(cat+"  ›",21,txt(),Typeface.BOLD);l.setGravity(Gravity.CENTER);item.addView(l);item.setOnClickListener(v->showList(cat,""));GridLayout.LayoutParams lp=new GridLayout.LayoutParams();lp.width=dp(170);lp.height=dp(210);lp.setMargins(dp(5),dp(7),dp(5),dp(7));g.addView(item,lp);}c.addView(g);bottom("Categories");}
            public void showList(String category,String query){base("Home");LinearLayout c=(LinearLayout)((ScrollView)root.getChildAt(0)).getChildAt(0);LinearLayout head=new LinearLayout(this);head.setGravity(Gravity.CENTER_VERTICAL);TextView title=tv((category.equals("All")?"All Jewellery":category)+"\n"+count(category,query)+" Items",27,txt(),Typeface.BOLD);head.addView(title,new LinearLayout.LayoutParams(0,-2,1));TextView filt=tv("Filter",18,gold,Typeface.BOLD);filt.setGravity(Gravity.CENTER);filt.setBackground(box(panel(),22,1));filt.setOnClickListener(v->showFilters(category));head.addView(filt,new LinearLayout.LayoutParams(dp(108),dp(55)));c.addView(head);HorizontalScrollView chips=new HorizontalScrollView(this);LinearLayout cr=new LinearLayout(this);for(String cat:cats){TextView chip=tv(cat,15,cat.equals(category)?Color.WHITE:txt(),Typeface.BOLD);chip.setGravity(Gravity.CENTER);chip.setBackground(box(cat.equals(category)?gold:panel(),22,1));chip.setOnClickListener(v->showList(cat,""));cr.addView(chip,new LinearLayout.LayoutParams(dp(112),dp(44)));}chips.addView(cr);c.addView(chips);GridLayout grid=new GridLayout(this);grid.setColumnCount(2);for(Product p:products){if(!category.equals("All")&&!p.category.equals(category))continue;if(query!=null&&query.length()>0&&!p.name.toLowerCase().contains(query.toLowerCase())&&!p.category.toLowerCase().contains(query.toLowerCase()))continue;grid.addView(productCard(p));}c.addView(grid);bottom("Home");}
            int count(String cat,String q){int n=0;for(Product p:products)if((cat.equals("All")||p.category.equals(cat))&&(q==null||q.length()==0||p.name.toLowerCase().contains(q.toLowerCase())))n++;return n;}
            View productCard(Product p){LinearLayout card=new LinearLayout(this);card.setOrientation(LinearLayout.VERTICAL);card.setBackground(box(panel(),12,1));JewelleryView j=new JewelleryView(this,p.shape,dark);card.addView(j,new LinearLayout.LayoutParams(-1,dp(150)));TextView name=tv(p.name,16,txt(),Typeface.BOLD);name.setPadding(dp(8),dp(6),dp(8),0);card.addView(name);TextView meta=tv(p.category+" • "+p.goldType,13,sub(),Typeface.NORMAL);meta.setPadding(dp(8),0,dp(8),dp(8));card.addView(meta);card.setOnClickListener(v->showDetail(p));GridLayout.LayoutParams lp=new GridLayout.LayoutParams();lp.width=dp(170);lp.height=dp(230);lp.setMargins(dp(5),dp(7),dp(5),dp(7));card.setLayoutParams(lp);return card;}
            public void showDetail(Product p){base("Detail");LinearLayout c=(LinearLayout)((ScrollView)root.getChildAt(0)).getChildAt(0);TextView back=tv("‹  Product Details",24,txt(),Typeface.BOLD);back.setOnClickListener(v->showHome());c.addView(back);JewelleryView img=new JewelleryView(this,p.shape,dark);img.caption=p.name;img.setBackground(box(panel(),14,1));img.setOnTouchListener(new View.OnTouchListener(){float sx;public boolean onTouch(View v,MotionEvent e){if(e.getAction()==0){sx=e.getX();return true;}if(e.getAction()==1){if(Math.abs(e.getX()-sx)>dp(40)){((JewelleryView)v).shape=(((JewelleryView)v).shape+1)%9;v.invalidate();}return true;}return true;}});c.addView(img,new LinearLayout.LayoutParams(-1,dp(320)));TextView name=tv(p.name,30,txt(),Typeface.BOLD);c.addView(name);TextView info=tv("Collection: "+p.collection+"\nCategory: "+p.category+"\nGold Type: "+p.goldType+"\nWeight: Approx. "+p.weight+" g\nCraftsmanship: Handcrafted\n\nDescription\nPure gold jewellery design with detailed motifs. No price, no purchase, only enquiry and wishlist options.",17,txt(),Typeface.NORMAL);info.setBackground(box(panel(),14,1));pad(info,16);c.addView(info);LinearLayout actions=new LinearLayout(this);TextView wish=tv("♡ Add to Wishlist",18,gold,Typeface.BOLD);wish.setGravity(Gravity.CENTER);wish.setBackground(box(bg(),12,1));wish.setOnClickListener(v->{if(!wishlist.contains(p))wishlist.add(p);Toast.makeText(this,"Added to wishlist",0).show();});actions.addView(wish,new LinearLayout.LayoutParams(0,dp(56),1));TextView enq=tv("Contact / Enquire",18,Color.WHITE,Typeface.BOLD);enq.setGravity(Gravity.CENTER);enq.setBackground(box(gold,12,0));actions.addView(enq,new LinearLayout.LayoutParams(0,dp(56),1));c.addView(actions);bottom("Home");}
            public void showCollections(){base("Collections");LinearLayout c=(LinearLayout)((ScrollView)root.getChildAt(0)).getChildAt(0);TextView title=tv("Collections\nTimeless Designs. Treasured Forever.",31,dark?gold2:txt(),Typeface.BOLD);title.setGravity(Gravity.CENTER);c.addView(title);for(String col:collections){FrameLayout card=heroCard(findByCollection(col),false);TextView label=tv(col+"\nCollection  ›",28,dark?gold2:brown,Typeface.BOLD);label.setPadding(dp(18),dp(25),0,0);card.addView(label);card.setOnClickListener(v->showList("All",col));c.addView(card,new LinearLayout.LayoutParams(-1,dp(175)));}bottom("Collections");}
            Product findByCollection(String col){for(Product p:products)if(p.collection.equals(col))return p;return products.get(0);}public void showWishlist(){base("Wishlist");LinearLayout c=(LinearLayout)((ScrollView)root.getChildAt(0)).getChildAt(0);TextView title=tv("Wishlist\nYour cherished pieces, saved with love.",30,dark?gold2:txt(),Typeface.BOLD);c.addView(title);GridLayout g=new GridLayout(this);g.setColumnCount(2);ArrayList<Product> list=wishlist.size()>0?wishlist:products;for(int i=0;i<Math.min(20,list.size());i++)g.addView(productCard(list.get(i)));c.addView(g);bottom("Wishlist");}
            public void showAccount(){base("Account");LinearLayout c=(LinearLayout)((ScrollView)root.getChildAt(0)).getChildAt(0);TextView name=tv("KRISHAN JEWELERA\nGold Jewellery Catalogue",30,dark?gold2:txt(),Typeface.BOLD);name.setGravity(Gravity.CENTER);c.addView(name);String[] opts={"Settings - Theme Change","Contact Details - Add Later","Store Location - Add Later","My Enquiries","Notifications","Help & Support"};for(String o:opts){TextView x=tv(o+"  ›",21,txt(),Typeface.BOLD);x.setBackground(box(panel(),12,1));pad(x,18);if(o.startsWith("Settings"))x.setOnClickListener(v->showSettings());c.addView(x,new LinearLayout.LayoutParams(-1,dp(70)));}bottom("Account");}
            public void showSettings(){base("Settings");LinearLayout c=(LinearLayout)((ScrollView)root.getChildAt(0)).getChildAt(0);TextView t=tv("Settings",32,txt(),Typeface.BOLD);c.addView(t);TextView b1=tv("Black Gold Theme",22,dark?Color.WHITE:txt(),Typeface.BOLD);b1.setGravity(Gravity.CENTER);b1.setBackground(box(dark?gold:panel(),14,1));b1.setOnClickListener(v->{dark=true;getPreferences(0).edit().putBoolean("dark",true).apply();showSettings();});c.addView(b1,new LinearLayout.LayoutParams(-1,dp(65)));TextView b2=tv("White Gold Theme",22,!dark?Color.WHITE:txt(),Typeface.BOLD);b2.setGravity(Gravity.CENTER);b2.setBackground(box(!dark?gold:panel(),14,1));b2.setOnClickListener(v->{dark=false;getPreferences(0).edit().putBoolean("dark",false).apply();showSettings();});c.addView(b2,new LinearLayout.LayoutParams(-1,dp(65)));TextView info=tv("Contact Details: Add your phone, WhatsApp, email later.\nLocation: Add shop address and Google Map link later.\nLarge photo support: connect Firebase / Cloudinary / server API for 10-20 lakh photos.",17,txt(),Typeface.NORMAL);info.setBackground(box(panel(),14,1));pad(info,18);c.addView(info);bottom("Account");}
            public void showFilters(String category){base("Filters");LinearLayout c=(LinearLayout)((ScrollView)root.getChildAt(0)).getChildAt(0);TextView title=tv("Filters",32,txt(),Typeface.BOLD);c.addView(title);String[][] groups={{"Categories","Necklaces,Earrings,Bangles,Rings,Pendants,Chains,Bracelets,Mangalsutra"},{"Collections","Heritage,Temple,Wedding,Festive,Royal,Daily Wear,Modern"},{"Sort By","Newest First,Bestselling,Popular,Top Rated"}};for(String[] g:groups){section(c,g[0],false,null);GridLayout grid=new GridLayout(this);grid.setColumnCount(2);for(String s:g[1].split(",")){TextView chip=tv(s,17,txt(),Typeface.BOLD);chip.setGravity(Gravity.CENTER);chip.setBackground(box(panel(),22,1));chip.setOnClickListener(v->showList(s,""));GridLayout.LayoutParams lp=new GridLayout.LayoutParams();lp.width=dp(165);lp.height=dp(50);lp.setMargins(dp(5),dp(7),dp(5),dp(7));grid.addView(chip,lp);}c.addView(grid);}TextView apply=tv("Apply Filters",20,Color.WHITE,Typeface.BOLD);apply.setGravity(Gravity.CENTER);apply.setBackground(box(gold,14,0));apply.setOnClickListener(v->showList(category,""));c.addView(apply,new LinearLayout.LayoutParams(-1,dp(58)));bottom("Home");}
            int shapeFor(String cat){for(int i=0;i<cats.length;i++)if(cats[i].equals(cat))return i%9;return 0;}void seed(){if(!products.isEmpty())return;String[] names={"Regal Heritage","Temple Grace","Royal Gold","Classic Elegance","Floral Majesty","Antique Charm","Divine Gold","Eternal Grace","Golden Bloom","Radiance"};for(int i=0;i<600;i++){String cat=cats[i%cats.length],col=collections[i%collections.length];products.add(new Product(names[i%names.length]+" "+cat.substring(0,cat.length()-1),cat,col,(i%3==0?"22K Gold":i%3==1?"24K Gold":"18K Gold"),shapeFor(cat),String.format(java.util.Locale.US,"%.3f",8+(i%70)*1.35)));}}
            static class Product{String name,category,collection,goldType,weight;int shape;Product(String n,String ca,String co,String gt,int sh,String w){name=n;category=ca;collection=co;goldType=gt;shape=sh;weight=w;}}
            public static class JewelleryView extends View{Paint p=new Paint(1);int shape;boolean dark;String caption="";public JewelleryView(Context c,int s,boolean d){super(c);shape=s;dark=d;}protected void onDraw(Canvas c){int w=getWidth(),h=getHeight();Paint p=this.p;int bg1=dark?Color.rgb(8,8,7):Color.rgb(255,246,228);int bg2=dark?Color.rgb(0,0,0):Color.rgb(250,235,205);LinearGradient gr=new LinearGradient(0,0,w,h,bg1,bg2,Shader.TileMode.CLAMP);p.setShader(gr);c.drawRoundRect(0,0,w,h,26,26,p);p.setShader(null);int gold=Color.rgb(228,166,31),gold2=Color.rgb(255,220,93);p.setStrokeCap(Paint.Cap.ROUND);p.setStyle(Paint.Style.STROKE);p.setStrokeWidth(6);p.setColor(gold);float cx=w/2f,cy=h*.47f;switch(shape){case 0:neck(c,w,h,gold,gold2);break;case 1:ear(c,w,h,gold,gold2);break;case 2:bang(c,w,h,gold,gold2);break;case 3:ring(c,w,h,gold,gold2);break;case 4:pend(c,w,h,gold,gold2);break;case 5:chain(c,w,h,gold,gold2);break;case 6:brace(c,w,h,gold,gold2);break;case 7:mangal(c,w,h,gold,gold2);break;default:ank(c,w,h,gold,gold2);}if(caption.length()>0){p.setShader(null);p.setStyle(Paint.Style.FILL);p.setColor(Color.argb(160,0,0,0));c.drawRect(0,h-52,w,h,p);p.setColor(Color.WHITE);p.setTextSize(28);p.setTypeface(Typeface.create(Typeface.SERIF,Typeface.BOLD));c.drawText(caption,18,h-18,p);}}
              void bead(Canvas c,float x,float y,float r,int col){p.setShader(new RadialGradient(x-r/3,y-r/3,r,Color.WHITE,col,Shader.TileMode.CLAMP));p.setStyle(Paint.Style.FILL);c.drawCircle(x,y,r,p);p.setShader(null);}void neck(Canvas c,int w,int h,int g,int g2){p.setStyle(Paint.Style.STROKE);p.setStrokeWidth(7);p.setColor(g);RectF r=new RectF(w*.12f,h*.08f,w*.88f,h*.70f);c.drawArc(r,30,120,false,p);for(int i=0;i<24;i++){double a=Math.toRadians(35+i*110.0/23);float x=(float)(w/2+Math.cos(a)*w*.36),y=(float)(h*.39+Math.sin(a)*h*.28);bead(c,x,y,7,g2);}pendant(c,w/2f,h*.58f,g,g2);}void pendant(Canvas c,float x,float y,int g,int g2){bead(c,x,y,34,g);bead(c,x,y,16,g2);for(int i=0;i<10;i++){double a=i*.628;bead(c,(float)(x+Math.cos(a)*45),(float)(y+Math.sin(a)*45),5,g2);}}void ear(Canvas c,int w,int h,int g,int g2){for(int k=0;k<2;k++){float x=w*(k==0?.35f:.65f);bead(c,x,h*.28f,18,g2);bead(c,x,h*.52f,38,g);for(int i=0;i<7;i++)bead(c,x-42+i*14,h*.72f,7,g2);}}void bang(Canvas c,int w,int h,int g,int g2){p.setStyle(Paint.Style.STROKE);p.setStrokeWidth(16);p.setColor(g);for(int i=0;i<3;i++)c.drawOval(w*.18f+i*18,h*.28f+i*10,w*.82f+i*18,h*.72f+i*10,p);for(int i=0;i<14;i++)bead(c,w*.24f+i*w*.04f,h*.50f+(i%2)*18,5,g2);}void ring(Canvas c,int w,int h,int g,int g2){p.setStyle(Paint.Style.STROKE);p.setStrokeWidth(24);p.setColor(g);c.drawCircle(w/2,h*.58f,60,p);bead(c,w/2,h*.28f,32,g2);for(int i=0;i<8;i++)bead(c,w/2-56+i*16,h*.38f,5,g2);}void pend(Canvas c,int w,int h,int g,int g2){p.setStyle(Paint.Style.STROKE);p.setStrokeWidth(5);p.setColor(g);c.drawLine(w*.35f,h*.05f,w/2,h*.35f,p);c.drawLine(w*.65f,h*.05f,w/2,h*.35f,p);pendant(c,w/2,h*.58f,g,g2);}void chain(Canvas c,int w,int h,int g,int g2){for(int i=0;i<22;i++){float x=w*.10f+i*w*.038f,y=h*.34f+(float)Math.sin(i*.7)*22;bead(c,x,y,10,i%2==0?g:g2);}pendant(c,w/2,h*.58f,g,g2);}void brace(Canvas c,int w,int h,int g,int g2){p.setStyle(Paint.Style.STROKE);p.setStrokeWidth(5);p.setColor(g);c.drawArc(new RectF(w*.18f,h*.30f,w*.82f,h*.75f),190,160,false,p);for(int i=0;i<18;i++)bead(c,w*.2f+i*w*.035f,h*.53f+(float)Math.sin(i*.5)*28,9,g2);bead(c,w/2,h*.50f,25,g);}void mangal(Canvas c,int w,int h,int g,int g2){for(int i=0;i<26;i++)bead(c,w*.1f+i*w*.032f,h*.35f+(float)Math.sin(i*.6)*25,7,i%2==0?Color.BLACK:g2);pendant(c,w/2,h*.58f,g,g2);}void ank(Canvas c,int w,int h,int g,int g2){p.setStyle(Paint.Style.STROKE);p.setStrokeWidth(5);p.setColor(g);c.drawArc(new RectF(w*.15f,h*.28f,w*.85f,h*.65f),15,150,false,p);for(int i=0;i<24;i++){double a=Math.toRadians(20+i*135.0/23);float x=(float)(w/2+Math.cos(a)*w*.34),y=(float)(h*.45+Math.sin(a)*h*.18);bead(c,x,y,7,g2);if(i%4==0)bead(c,x,y+23,5,g);}}}
