name: Build APK From ZIP

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip Android project
        run: |
          mkdir krishna_app
          unzip -q Krishna_Jewelers_GitHub_Upload_Ready.zip -d krishna_app
          ls -la krishna_app

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android tools
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Download Gradle
        run: |
          curl -L https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          cd krishna_app
          gradle --no-daemon assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Krishna-Jewelers-APK
          path: krishna_app/app/build/outputs/apk/debug/app-debug.apk
